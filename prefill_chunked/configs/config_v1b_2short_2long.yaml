# V1-B: 2 independent short replicas (GPU 0-1) + 2 long replicas (GPU 2-3).
# SLO-aware router on :8000 with prefix-locality via rendezvous hash.

model:
  model_path: /models/gpt-oss-20b
  served_model_name: /models/gpt-oss-20b

default_chat_template_kwargs:
  reasoning_effort: low

server:
  host: 0.0.0.0
  port: 8000

deployment:
  mode: replica_short_long
  split_prompt_tokens: 8192
  router:
    prefix_locality: true
  workers:
    short-0:
      pool: short
      cuda_visible_devices: "0"
      internal_port: 8001
      vllm:
        tensor_parallel_size: 1
        data_parallel_size: 1
        max_model_len: 12288
        gpu_memory_utilization: 0.95
        max_num_seqs: 24
        max_num_partial_prefills: 2
        enable_prefix_caching: true
        enable_concurrent_prefill_patch: true
        extra_args:
          - --default-chat-template-kwargs
          - '{"reasoning_effort":"low"}'
          - --max-num-batched-tokens
          - "12288"
          - --enable-chunked-prefill
          - --max-num-partial-prefills
          - "2"
          - --max-long-partial-prefills
          - "1"
          - --long-prefill-token-threshold
          - "6144"
          - --kv-cache-dtype
          - auto
          - --block-size
          - "16"
          - --max-cudagraph-capture-size
          - "256"
          - --async-scheduling
          - --performance-mode
          - interactivity
    short-1:
      pool: short
      cuda_visible_devices: "1"
      internal_port: 8002
      vllm:
        tensor_parallel_size: 1
        data_parallel_size: 1
        max_model_len: 12288
        gpu_memory_utilization: 0.95
        max_num_seqs: 24
        max_num_partial_prefills: 2
        enable_prefix_caching: true
        enable_concurrent_prefill_patch: true
        extra_args:
          - --default-chat-template-kwargs
          - '{"reasoning_effort":"low"}'
          - --max-num-batched-tokens
          - "12288"
          - --enable-chunked-prefill
          - --max-num-partial-prefills
          - "2"
          - --max-long-partial-prefills
          - "1"
          - --long-prefill-token-threshold
          - "6144"
          - --kv-cache-dtype
          - auto
          - --block-size
          - "16"
          - --max-cudagraph-capture-size
          - "256"
          - --async-scheduling
          - --performance-mode
          - interactivity
    long-0:
      pool: long
      cuda_visible_devices: "2"
      internal_port: 8003
      vllm:
        tensor_parallel_size: 1
        data_parallel_size: 1
        max_model_len: 28672
        gpu_memory_utilization: 0.95
        max_num_seqs: 8
        max_num_partial_prefills: 1
        enable_prefix_caching: true
        enable_concurrent_prefill_patch: true
        extra_args:
          - --default-chat-template-kwargs
          - '{"reasoning_effort":"low"}'
          - --max-num-batched-tokens
          - "24576"
          - --enable-chunked-prefill
          - --max-num-partial-prefills
          - "1"
          - --max-long-partial-prefills
          - "1"
          - --long-prefill-token-threshold
          - "24576"
          - --kv-cache-dtype
          - auto
          - --block-size
          - "16"
          - --max-cudagraph-capture-size
          - "128"
          - --async-scheduling
          - --performance-mode
          - interactivity
    long-1:
      pool: long
      cuda_visible_devices: "3"
      internal_port: 8004
      vllm:
        tensor_parallel_size: 1
        data_parallel_size: 1
        max_model_len: 28672
        gpu_memory_utilization: 0.95
        max_num_seqs: 8
        max_num_partial_prefills: 1
        enable_prefix_caching: true
        enable_concurrent_prefill_patch: true
        extra_args:
          - --default-chat-template-kwargs
          - '{"reasoning_effort":"low"}'
          - --max-num-batched-tokens
          - "24576"
          - --enable-chunked-prefill
          - --max-num-partial-prefills
          - "1"
          - --max-long-partial-prefills
          - "1"
          - --long-prefill-token-threshold
          - "24576"
          - --kv-cache-dtype
          - auto
          - --block-size
          - "16"
          - --max-cudagraph-capture-size
          - "128"
          - --async-scheduling
          - --performance-mode
          - interactivity

vllm:
  tensor_parallel_size: 1
  data_parallel_size: 1
  max_model_len: 12288
  gpu_memory_utilization: 0.95
  max_num_seqs: 24
  max_num_partial_prefills: 2
  enable_prefix_caching: true
  enable_concurrent_prefill_patch: true
  extra_args: []

warmup:
  enabled: true
  readiness_gate: true
  health_timeout_sec: 1800
  health_poll_interval_sec: 5
  request_timeout_sec: 120
  concurrency: 16
  rounds: 3
  stream: true
  token_tolerance_pct: 0.05
  scenarios:
    - name: tiny_p10
      prompt_tokens: 64
      max_tokens: 64
      weight: 4
      reasoning_effort: low
    - name: short_p25
      prompt_tokens: 128
      max_tokens: 96
      weight: 4
      reasoning_effort: low
    - name: bulk_p50
      prompt_tokens: 4256
      max_tokens: 96
      weight: 10
      reasoning_effort: low
    - name: bulk_long_decode
      prompt_tokens: 4288
      max_tokens: 256
      weight: 6
      reasoning_effort: low
    - name: p90_prefill
      prompt_tokens: 5504
      max_tokens: 320
      weight: 2
      reasoning_effort: low
    - name: tail_p95
      prompt_tokens: 24256
      max_tokens: 512
      weight: 6
      reasoning_effort: low
      pool: long

logging:
  log_dir: /app/logs/config_v1b_2short_2long
  timezone: Asia/Ho_Chi_Minh
  datetime_format: "%d/%m/%Y %H:%M:%S"
