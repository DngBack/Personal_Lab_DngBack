# =============================================================================
# A/B-17: W4A8 — int4 weights + fp8 ACTIVATIONS via custom-built machete kernels
# =============================================================================
# THIS IS A STRICT SINGLE-VARIABLE DELTA vs ab14 (graded 65.88).
#   ab14: ATQ_W4A16=128  -> int4 weights, BF16 activations
#   ab17: ATQ_W4A8 =128  -> int4 weights, FP8  activations
# Every other env/flag/healthcheck is byte-identical to ab14. So the graded
# delta isolates exactly one thing: the activation dtype of the linear GEMMs.
#
# WHY THIS SHOULD FIX ab14's REGRESSION
# -------------------------------------
# ab14 proved the weight-bandwidth model was RIGHT: halving the weight bytes
# moved tbt_median 4 -> 3, the only lever that has ever moved it. But it LOST
# overall (65.88 < 68.27) because W4A16 feeds the tensor cores BF16 activations,
# which run at HALF the fp8 rate and scale with batch -> prefill got slower ->
# TTFT went up and ate the TBT win. W4A8 keeps the identical weight-byte saving
# while running the MMA in fp8, so the prefill penalty should disappear.
#
# THE IMAGE IS NOT STOCK — WE BUILT THE MISSING KERNELS
# -----------------------------------------------------
# Upstream vLLM CANNOT do this: the machete "QQQ" config (a=e4m3, b=uint4b8,
# group_scales=f16, channel_scales=f32, token_scales=f32, out=f16) is COMMENTED
# OUT in csrc/quantization/machete/generate.py, so no wheel ever compiles it --
# machete_supported_schedules() returns 0 schedules for a_type=fp8 in the stock
# r18/v9 images. We patched the generator, compiled those kernels against the
# image's own torch 2.11.0+cu130 for sm_90a, and shipped them as a SEPARATE
# torch library `machete_fp8` so the fork's own `_C` and `vllm_qknrc` extensions
# are left completely untouched. Result: 0 -> 7 working schedules.
#   image: dngback/vllm-v0.24.0-ubuntu2404-opt-2:r18-w4a8-v1
#        = r18-atq-v1 + machete_fp8_C.so + the vllm_w4a8 plugin (pip-installed,
#          registered on the `vllm.general_plugins` entry point).
#
# VERIFIED LOCALLY (H200, GPU1) BEFORE SUBMITTING
#   kernel numerics vs the UNQUANTIZED weight reference, n=k=2048, g128:
#       dense fp8 W8A8 (baseline) . 3.7%   |  W4A8 (this) . 11.9%
#       int4 with a PERFECT dequant ....... 11.5%  -> our kernel costs +0.4pp,
#       i.e. the error is inherent to int4, NOT a kernel bug. Identical across
#       all 7 schedules and across m=1/8/64/512 (decode AND prefill shapes).
#   boot ......... healthy in ~75s, 64 LinearBase layers quantized
#   generation ... "17 plus 25" -> 42 ; "12 times 7" -> 84 ; Eiffel -> Paris
#   NEEDLE 12k ... retrieved ZEBRA-7391  <-- passes the long-context probe that
#                  killed every layer-drop variant (ab4 scored 0%). This is the
#                  gate that aborts the protocol, so it matters more than ERS.
#
# ACCURACY GATE: int4 is ~3x lossier than fp8, BUT ab14 already proved int4-g128
# on this model clears the GPQA gate (it scored 65.88, not 0). W4A8 uses the very
# same int4 g128 RTN weights, so the accuracy risk is the ALREADY-MEASURED one.
#
# >>> WHY THERE IS NO LOCAL TIMING CLAIM HERE (deliberate):
#   Benchmarked on a FULL H200 this config's TPOT is ~9% WORSE than dense fp8 --
#   but that measurement is NOT predictive of the graded MiG slice, because it
#   measures a different regime. On a full H200, 1.2GB of fp8 weights / 4.8TB/s
#   = 0.25ms of a 4.5ms step -> only ~5% is weight-bandwidth, so halving weights
#   cannot help and the 2 extra kernels/layer just cost. On MiG 1g.18gb
#   (~0.68TB/s) the same read is ~1.8ms of a ~4ms step -> ~45%, which is exactly
#   why ab14 moved tbt 4->3 on the grader and nothing local ever reproduced it.
#   The bet rests on ab14's GRADED evidence, not on local numbers.
#   If this lands below ab14, the overhead-reduced variant is ab18 (FFN-only).
# =============================================================================
services:
  model:
    image: dngback/vllm-v0.24.0-ubuntu2404-opt-2:r18-w4a8-v1
    entrypoint:
      - python3 #Don't change this to vllm-server
      - -m  #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server #Don't change this to vllm-server
    environment:
      VLLM_USE_RUST_FRONTEND: "1"
      ENGPACE_RATE_MS: "12"
      ENGPACE_BURST_N: "3"
      AIR_WARMUP: "1"
      AIR_WARMUP_PROMPT_TOKENS: "4096"
      AIR_WARMUP_MAX_TOKENS: "32"
      AIR_WARMUP_N: "8"
      AIR_WARMUP_LONG: "0"
      AIR_GC_FREEZE: "0"
      AIR_PRIME_CACHE: "0"
      AIR_PRIME_PACK: "0"
      AIR_LMHEAD_FP8: "1"
      # ---- THE ONE CHANGE vs ab14: W4A16 (bf16 acts) -> W4A8 (fp8 acts) ----
      # The plugin RAISES if it cannot quantize a single layer, so a silently
      # unpatched run is impossible: a broken build fails the healthcheck
      # instead of quietly serving an unquantized model.
      ATQ_W4A8: "128"
    volumes:
      - lfm25_model:/model:ro
    command:
      - --model=/model #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct #Don't change this to vllm-server
      - --host=0.0.0.0 #Don't change this to vllm-server
      - --port=8000 #Don't change this to vllm-server
      - --max-model-len=8192
      - --gpu-memory-utilization=0.88
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-num-batched-tokens=2048
      - --max-num-seqs=8
      - --async-scheduling
      - --no-enable-log-requests
      # NO --quantization flag: weights must land in bf16 so the plugin can
      # quantize them itself in process_weights_after_loading.
      - --kv-cache-dtype=fp8_e4m3
      - --mamba-cache-dtype=bfloat16
      - --mamba-cache-mode=align
      - --attention-backend=FLASHINFER
      - --disable-cascade-attn
      - '--compilation-config={"cudagraph_capture_sizes":[1,2,4,8,12,16,24,32,48,64]}'
      - --prefill-bias-enabled
      - --prefill-bias-cache-aware
      - --prefill-bias-tbt-guard-enabled
      - --prefill-bias-tbt-slo-s=0.010
      - --prefill-bias-ttft-slo-s=0.400
    ports:
      - "8137:8000"
    shm_size: "2g"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/.air_warmup_done"]
      interval: 5s
      timeout: 3s
      retries: 240
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
volumes:
  lfm25_model:
    external: true
