services:
  model:
    image: ${VLLM_PARTIAL_PREFILL_IMAGE:-dngback/vllm-v0.24.0-ubuntu2404-concurrent-prefill:latest}
    entrypoint:
      - python3 #Don't change this to vllm-server
      - -m  #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server #Don't change this to vllm-server
    command:
      - --model=${MODEL_ID:-Qwen/Qwen2.5-1.5B-Instruct} #Don't change this to vllm-server
      - --served-model-name=${SERVED_MODEL_NAME:-Qwen2.5-1.5B-Instruct} #Don't change this to vllm-server
      - --host=0.0.0.0 #Don't change this to vllm-server
      - --port=8000 #Don't change this to vllm-server
      - --max-model-len=32768
      - --gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.90}
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-num-batched-tokens=8192
      - --max-num-seqs=48
      - --max-cudagraph-capture-size=48
      - --async-scheduling
      - --kv-cache-dtype=fp8_e4m3
      - --quantization=fp8
      - --max-num-partial-prefills=2
      - --max-long-partial-prefills=1
      - --long-prefill-token-threshold=8192
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
