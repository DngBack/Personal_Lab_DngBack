services:
  model:
    image: ${VLLM_PARTIAL_PREFILL_IMAGE:-dngback/vllm-v0.24.0-ubuntu2404-concurrent-prefill:concurrent-prefill}
    entrypoint:
      - python3 #Don't change this to vllm-server
      - -m  #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server #Don't change this to vllm-server
    command:
      - --model=${MODEL_ID:-Qwen/Qwen3.5-2B} #Don't change this to vllm-server
      - --served-model-name=${SERVED_MODEL_NAME:-Qwen3.5-2B} #Don't change this to vllm-server
      - --host=0.0.0.0 #Don't change this to vllm-server
      - --port=8000 #Don't change this to vllm-server
      # DO NOT reduce below ~28672: measured with the real Qwen3.5-2B tokenizer,
      # trace-round1's longest prompt is 27,398 tokens (27,598 incl. completion).
      # The old "~20K tokens" note in earlier commits was a char-count guess and
      # was wrong - trusting it here would truncate/reject the longest requests.
      - --max-model-len=32768
      # Contest rig has 18GB VRAM total: 0.95 -> ~17.1GB budget (graded OK in r1/r2).
      # Local A30 24GB: override GPU_MEMORY_UTILIZATION=0.75 to emulate the 18GB cap.
      - --gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.95}
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --enable-chunked-prefill
      # Trace is text-only (workload_type=conversation, no image content parts) but
      # Qwen3.5-2B is a VL checkpoint by default: without these two flags vLLM still
      # reserves an encoder-cache budget and runs a ~27s multimodal warmup at startup.
      # Verified locally: language-model-only zeroes every mm modality limit (no
      # correctness risk for a text-only trace) and freed ~1GiB -> KV cache size
      # 1.84M -> 1.98M tokens (+7.6%), with end-to-end replay numbers unchanged
      # (noise-level, this trace isn't KV-memory bound) - pure upside, no downside.
      - --language-model-only
      - --skip-mm-profiling
      - --max-num-batched-tokens=${MAX_NUM_BATCHED_TOKENS:-8192}
      - --max-num-seqs=${MAX_NUM_SEQS:-64}
      - --max-cudagraph-capture-size=${MAX_CUDAGRAPH_CAPTURE_SIZE:-64}
      - --async-scheduling
      - --kv-cache-dtype=fp8_e4m3
      - --quantization=fp8
      # Local replay on trace-round1 with REAL Qwen3.5-2B (hybrid GatedDeltaNet+attn):
      # pp=2 raised TTFT p50 (was faster) but blew up p95 3-5x (33.7s vs 12.3s) - a few
      # requests starve when prefill budget is split. pp=1 gives the best p95, matches
      # stock scheduling behavior. Re-test pp=2 only if a future trace mixes short and
      # long prompts (this one is 120 near-uniform ~20K-token prompts).
      - --max-num-partial-prefills=${MAX_NUM_PARTIAL_PREFILLS:-1}
      - --max-long-partial-prefills=${MAX_LONG_PARTIAL_PREFILLS:-1}
      - --long-prefill-token-threshold=${LONG_PREFILL_TOKEN_THRESHOLD:-24576}
      # MTP speculative decoding TESTED and REJECTED across 4 configurations - not just
      # a compute-saturation artifact, it loses in every regime tried on this GPU:
      #   - seqs=48, FlashInfer backend: wall time 42s->62s, TBT median 15->36ms
      #     (acceptance rate was healthy, ~65-70%, mean accept len 1.65-1.7/2 - the
      #     draft head itself works; the cost is elsewhere)
      #   - seqs=16 (low concurrency, tests whether it's purely a saturation effect):
      #     STILL worse - wall time 47s->78s, TBT median 8.5->31ms. Rules out "only
      #     hurts when GPU is compute-saturated" as the sole explanation.
      #   - seqs=48, forced --attention-backend=FLASH_ATTN (avoids vLLM's automatic
      #     CUDAGraphMode downgrade to PIECEWISE-only that happens with FlashInfer+
      #     spec-decode): still worse (wall time 60s, TBT median 39ms). Rules out the
      #     CUDAGraph downgrade as the sole explanation too.
      # Net conclusion: the extra full-backbone draft forward pass per decode step
      # costs more than it saves on this Ampere/Marlin-FP8 hardware, independent of
      # concurrency or CUDAGraph mode. Untested on the actual contest GPU (likely
      # Hopper/native-FP8, where the cost structure could differ) - worth a quick
      # real-rig check before ruling it out permanently, but do not ship it blind.
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
